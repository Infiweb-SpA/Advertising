<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - The Culinary Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=Manrope:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .font-headline { font-family: 'Newsreader', serif; }
    </style>
</head>
<body class="bg-[#FDF9F3] flex items-center justify-center min-h-screen py-8 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-6 md:p-10 rounded-lg shadow-lg">
        <div>
            <h2 class="text-3xl md:text-4xl font-headline italic text-primary text-center">Crear Cuenta</h2>
            <p class="mt-2 text-center text-sm text-gray-600">Regístrate para realizar pedidos más rápido</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="p-3 rounded text-sm {% if category == 'success' %}bg-green-100 text-green-800{% elif category == 'danger' or category == 'warning' %}bg-red-100 text-red-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="mt-8 space-y-6" method="POST">
            <div>
                <label for="username" class="sr-only">Nombre de usuario</label>
                <input id="username" name="username" type="text" required class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Nombre de usuario">
            </div>
            <div>
                <label for="email" class="sr-only">Correo electrónico</label>
                <input id="email" name="email" type="email" required class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Correo electrónico">
            </div>
            <div>
                <label for="password" class="sr-only">Contraseña</label>
                <input id="password" name="password" type="password" required class="appearance-none rounded-md relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Contraseña">
            </div>
            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-[#1B3022] hover:bg-[#0f1f14] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary">
                    Registrarse
                </button>
            </div>
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-primary hover:underline">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
